zerops:
  # Dev workspace (appdev): full source self-deploys; the dev server is
  # started on demand via zerops_dev_server (no supervised run.start).
  - setup: dev
    build:
      base: nodejs@24
      buildCommands:
        - npm install
      deployFiles: [.]
    run:
      base: nodejs@24
      ports:
        - port: 3000
          httpSupport: true
      envVariables:
        NODE_ENV: development
        DATABASE_URL: ${db_connectionString}
        # Meilisearch (back-office ⌘K search). Internal address only;
        # the master key stays server-side (never sent to the browser).
        MEILI_HOST: http://search:${search_port}
        MEILI_MASTER_KEY: ${search_masterKey}
        SMTP_HOST: mailpit
        SMTP_PORT: "1025"
        EMAIL_FROM: ZRNO Coffee <hello@zrno.cz>
        EMAIL_PROVIDER: smtp
        # Object storage (S3-compatible MinIO) for journal image uploads.
        S3_ENDPOINT: ${storage_apiUrl}
        S3_BUCKET: ${storage_bucketName}
        S3_REGION: us-east-1
        S3_ACCESS_KEY_ID: ${storage_accessKeyId}
        S3_SECRET_ACCESS_KEY: ${storage_secretAccessKey}

  # Production build (appstage + recipe single-service envs): cross-deployed
  # from appdev, or built from git in a recipe import. Vite + Nitro produce a
  # self-contained Node server at .output/server/index.mjs.
  - setup: prod
    build:
      base: nodejs@24
      buildCommands:
        - npm install
        - npm run build
      deployFiles:
        - .output
    deploy:
      # Gate the traffic switch on the server actually answering.
      readinessCheck:
        httpGet:
          port: 3000
          path: /
    run:
      base: nodejs@24
      ports:
        - port: 3000
          httpSupport: true
      # Restart the container if the app stops answering on the root route.
      healthCheck:
        httpGet:
          port: 3000
          path: /
      envVariables:
        NODE_ENV: production
        PORT: "3000"
        DATABASE_URL: ${db_connectionString}
        # Meilisearch (back-office ⌘K search). Internal address only;
        # the master key stays server-side (never sent to the browser).
        MEILI_HOST: http://search:${search_port}
        MEILI_MASTER_KEY: ${search_masterKey}
        SMTP_HOST: mailpit
        SMTP_PORT: "1025"
        EMAIL_FROM: ZRNO Coffee <hello@zrno.cz>
        EMAIL_PROVIDER: smtp
        # Object storage (S3-compatible MinIO) for journal image uploads.
        S3_ENDPOINT: ${storage_apiUrl}
        S3_BUCKET: ${storage_bucketName}
        S3_REGION: us-east-1
        S3_ACCESS_KEY_ID: ${storage_accessKeyId}
        S3_SECRET_ACCESS_KEY: ${storage_secretAccessKey}
      start: node .output/server/index.mjs
