zerops:
  # Dev workspace (appdev): full source self-deploys; the dev server is
  # started on demand via zerops_dev_server (no supervised run.start).
  - setup: dev
    build:
      base: nodejs@22
      buildCommands:
        - npm install
      deployFiles: [.]
    run:
      base: nodejs@22
      ports:
        - port: 3000
          httpSupport: true
      envVariables:
        NODE_ENV: development
        DATABASE_URL: ${db_connectionString}
        SMTP_HOST: mailpit
        SMTP_PORT: "1025"
        EMAIL_FROM: ZRNO Coffee <hello@zrno.cz>
        EMAIL_PROVIDER: smtp

  # Production build (appstage): cross-deployed from appdev. Vite + Nitro
  # produce a self-contained Node server at .output/server/index.mjs.
  - setup: prod
    build:
      base: nodejs@22
      buildCommands:
        - npm install
        - npm run build
      deployFiles:
        - .output
    run:
      base: nodejs@22
      ports:
        - port: 3000
          httpSupport: true
      envVariables:
        NODE_ENV: production
        PORT: "3000"
        DATABASE_URL: ${db_connectionString}
        SMTP_HOST: mailpit
        SMTP_PORT: "1025"
        EMAIL_FROM: ZRNO Coffee <hello@zrno.cz>
        EMAIL_PROVIDER: smtp
      start: node .output/server/index.mjs
